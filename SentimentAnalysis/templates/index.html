<!DOCTYPE html>
<html>

<head>
    <title>Sentiment Analysis</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Sentiment Analysis App</h1>

    <form method="POST">

        <input
            type="text"
            name="text"
            placeholder="Enter text here"
            required
        >

        <br>

        <button type="submit">
            Check Sentiment
        </button>

    </form>

    <h2>{{ result }}</h2>

</div>

</body>
</html>
